spring:
  datasource:
    url: jdbc:h2:file:./data/booktrackerdb;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: embedded

  h2:
    console:
      enabled: true
      path: /h2-console

application:
  title: "Book Tracker"