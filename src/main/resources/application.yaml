spring:
  datasource:
    url: jdbc:h2:mem:booktrackerdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: embedded

  h2:
    console:
      enabled: true
      path: /h2-console

application:
  title: "Book Tracker"